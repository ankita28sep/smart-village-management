
# ===============================
# Application Configuration
# ===============================
spring.application.name=smart-village-backend
server.port=8080

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_village_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
#security configuration
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey123456
jwt.expiration=3600000
# ===============================
# Logging Configuration
# ===============================
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Jackson Configuration (JSON)
# ===============================
spring.jackson.serialization.indent_output=true

# ===============================
# Error Handling
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
